<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gem" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb6b2"/>
      <stop offset="40%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </linearGradient>
    <linearGradient id="inner" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#a371f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <!-- Outer gem shape -->
  <polygon points="256,32 448,160 384,448 128,448 64,160" fill="url(#gem)"/>
  <!-- Inner facet -->
  <polygon points="256,80 400,176 352,400 160,400 112,176" fill="url(#inner)"/>
  <!-- Top facet highlight -->
  <polygon points="256,32 448,160 256,200 64,160" fill="rgba(255,255,255,0.12)"/>
  <!-- Center line -->
  <line x1="256" y1="32" x2="256" y2="448" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- Left facet line -->
  <line x1="64" y1="160" x2="256" y2="448" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
  <!-- Right facet line -->
  <line x1="448" y1="160" x2="256" y2="448" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
</svg>
